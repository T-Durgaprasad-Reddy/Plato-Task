[build]
builder = "nixpacks"

[deploy]
startCommand = "python manage.py migrate && python manage.py seed_data && gunicorn config.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/api/v1/merchants/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
